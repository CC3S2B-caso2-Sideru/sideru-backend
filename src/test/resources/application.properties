spring.application.name=sideru-backend
server.servlet.context-path=/api

spring.datasource.url=jdbc:h2:mem:sideru_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
